<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ordine Gelato">
<title>Ordine Gelato Conad</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f4f8; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; flex-wrap: wrap; gap: 6px; }
  .header-titoli h1 { font-size: 20px; font-weight: 700; color: #1a1a2e; }
  .header-titoli p { font-size: 13px; color: #6b7280; margin-top: 4px; }
  .data-box {
    background: #fff; border-radius: 10px; padding: 8px 14px;
    font-size: 13px; font-weight: 800; color: #0d9488;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    text-transform: capitalize; white-space: nowrap;
  }
  .categoria-titolo {
    font-size: 13px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; color: #fff;
    background: #29ABE2;
    margin: 18px 0 8px;
    padding: 7px 0;
    text-align: center;
    border-radius: 10px;
  }
  .categoria-titolo:first-of-type { margin-top: 0; }
  .card { background: #fff; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden; margin-bottom: 0.4rem; }
  .prodotto { display: flex; align-items: center; padding: 11px 16px; border-bottom: 0.5px solid #f0f0f0; gap: 10px; }
  .prodotto:last-child { border-bottom: none; }
  .num { font-size: 12px; color: #9ca3af; font-weight: 600; min-width: 18px; text-align: right; }
  .nome { font-size: 14px; color: #1a1a2e; font-weight: 500; flex: 1; }
  .prodotto.bio { background: #dcfce7; }
  .prodotto.bio .nome { color: #15803d; font-weight: 700; }
  .prodotto.bio .num { color: #22c55e; }
  .prodotto.senza-lattosio { background: #dbeafe; }
  .prodotto.senza-lattosio .nome { color: #1d4ed8; font-weight: 700; }
  .prodotto.senza-lattosio .num { color: #3b82f6; }
  .tag {
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 20px; margin-left: 6px; text-transform: uppercase;
    letter-spacing: 0.3px; vertical-align: middle;
  }
  .tag.bio { background: #bbf7d0; color: #166534; }
  .tag.sl { background: #bfdbfe; color: #1e40af; }
  .controlli { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .btn-qty { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid #d1d5db; background: #f9fafb; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #374151; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
  .btn-qty:active { background: #e5e7eb; }
  .qty { min-width: 24px; text-align: center; font-size: 15px; font-weight: 600; color: #1a1a2e; }
  .qty.attivo { color: #0d9488; }
  .totale-box { background: #fff; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); padding: 14px 16px; margin: 1.2rem 0 1rem; display: flex; align-items: center; justify-content: space-between; }
  .totale-label { font-size: 14px; color: #6b7280; font-weight: 500; }
  .totale-num { font-size: 22px; font-weight: 700; color: #0d9488; }
  .annotazioni-box { background: #fff; border-radius: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); padding: 14px 16px; margin-bottom: 1rem; }
  .annotazioni-label { font-size: 13px; color: #6b7280; font-weight: 600; margin-bottom: 8px; display: block; }
  .annotazioni-box textarea {
    width: 100%; min-height: 70px; border: 1.5px solid #e5e7eb; border-radius: 10px;
    padding: 10px; font-size: 14px; font-family: inherit; resize: vertical;
    background: #f9fafb; color: #1a1a2e;
  }
  .annotazioni-box textarea:focus { outline: none; border-color: #0d9488; }
  .btn-invia { display: block; width: 100%; padding: 16px; background: #25D366; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; }
  .btn-invia:active { background: #1da851; }
  .reset-btn { width: 100%; margin-top: 10px; padding: 10px; background: transparent; border: 1px solid #d1d5db; border-radius: 10px; font-size: 14px; color: #6b7280; cursor: pointer; }
  .reset-btn:active { background: #f3f4f6; }
</style>
</head>
<body>

<header>
  <div class="header-titoli">
    <h1>🧊 Ordine Gelato</h1>
    <p>Conad — seleziona i fardelli e invia</p>
  </div>
  <div class="data-box" id="dataOggi"></div>
</header>

<div id="listaProdotti"></div>

<div class="totale-box">
  <span class="totale-label">Totale colli</span>
  <span class="totale-num" id="totale">0</span>
</div>

<div class="annotazioni-box">
  <span class="annotazioni-label">📝 Annotazioni</span>
  <textarea id="annotazioni" placeholder="Note aggiuntive sull'ordine..."></textarea>
</div>

<button class="btn-invia" onclick="invia()">📲 Invia ordine su WhatsApp</button>
<button class="reset-btn" onclick="resetta()">↺ Azzera tutto</button>

<script>
// Struttura: categorie con relativi prodotti. Flag bio / sl per evidenziare.
var categorie = [
  {
    nome: "Linea Vasche 500 gr.",
    prodotti: [
      "Stracciatella",
      "Fiordipanna",
      "Limone",
      "Yogurt variegato Frutti di Bosco",
      "Caramello Salato",
      "Crokko Lampone"
    ]
  },
  {
    nome: "Linea Coni",
    prodotti: [
      "Panna (6)"
    ]
  },
  {
    nome: "Linea Biscotti",
    prodotti: [
      "Panna (5)"
    ]
  },
  {
    nome: "Linea Stecchi",
    prodotti: [
      "Ricoperti (6)"
    ]
  },
  {
    nome: "Linea Sorbetto",
    prodotti: [
      "Caffè"
    ]
  }
];

// Appiattiamo in un unico array per indicizzazione globale, mantenendo riferimento categoria
var nomi = [];
var tipi = []; // "", "bio", "sl"
var catStart = []; // indice di inizio di ogni categoria

categorie.forEach(function(cat) {
  catStart.push(nomi.length);
  cat.prodotti.forEach(function(p) {
    if (typeof p === "string") {
      nomi.push(p);
      tipi.push("");
    } else {
      nomi.push(p.n);
      tipi.push(p.tipo);
    }
  });
});

var qty = new Array(nomi.length).fill(0);

// Render lista con intestazioni di categoria
var container = document.getElementById("listaProdotti");
var globalIndex = 0;
categorie.forEach(function(cat) {
  var titolo = document.createElement("div");
  titolo.className = "categoria-titolo";
  titolo.textContent = cat.nome;
  container.appendChild(titolo);

  var card = document.createElement("div");
  card.className = "card";

  cat.prodotti.forEach(function(p, idxInCat) {
    var nome = typeof p === "string" ? p : p.n;
    var tipo = typeof p === "string" ? "" : p.tipo;
    var i = globalIndex;

    var row = document.createElement("div");
    row.className = "prodotto" + (tipo === "bio" ? " bio" : "") + (tipo === "sl" ? " senza-lattosio" : "");

    var tagHtml = "";
    if (tipo === "bio") tagHtml = '<span class="tag bio">Bio</span>';
    if (tipo === "sl") tagHtml = '<span class="tag sl">S.Lattosio</span>';

    row.innerHTML =
      '<span class="num">' + (idxInCat + 1) + '</span>' +
      '<span class="nome">' + nome + tagHtml + '</span>' +
      '<div class="controlli">' +
        '<button class="btn-qty" onclick="cambiaQt(' + i + ',-1)">−</button>' +
        '<span class="qty" id="q' + i + '">0</span>' +
        '<button class="btn-qty" onclick="cambiaQt(' + i + ',+1)">+</button>' +
      '</div>';
    card.appendChild(row);
    globalIndex++;
  });

  container.appendChild(card);
});

function cambiaQt(i, delta) {
  qty[i] = Math.max(0, qty[i] + delta);
  var el = document.getElementById("q" + i);
  el.textContent = qty[i];
  el.className = qty[i] > 0 ? "qty attivo" : "qty";
  var tot = 0;
  for (var j = 0; j < qty.length; j++) tot += qty[j];
  document.getElementById("totale").textContent = tot;
}

function resetta() {
  for (var i = 0; i < qty.length; i++) {
    qty[i] = 0;
    document.getElementById("q" + i).textContent = "0";
    document.getElementById("q" + i).className = "qty";
  }
  document.getElementById("totale").textContent = "0";
  document.getElementById("annotazioni").value = "";
}

function invia() {
  var righe = [];
  var tot = 0;
  var categoriaCorrente = "";
  var i = 0;

  categorie.forEach(function(cat) {
    var righeCategoria = [];
    cat.prodotti.forEach(function(p) {
      var nome = typeof p === "string" ? p : p.n;
      if (qty[i] > 0) {
        righeCategoria.push("• " + nome + " - " + qty[i]);
        tot += qty[i];
      }
      i++;
    });
    if (righeCategoria.length > 0) {
      righe.push("*" + cat.nome + "*");
      righe.push(righeCategoria.join("\n"));
    }
  });

  if (righe.length === 0) { alert("Inserisci almeno un prodotto."); return; }

  var note = document.getElementById("annotazioni").value.trim();

  var testo = "🧊 *Ordine Gelato Conad*\n\n" + righe.join("\n") + "\n\n*Totale colli: " + tot + "*";
  if (note) {
    testo += "\n\n📝 *Annotazioni:*\n" + note;
  }
  testo += "\n\nGrazie!";

  window.location.href = "https://wa.me/?text=" + encodeURIComponent(testo);
}

// Data automatica in italiano
function aggiornaData() {
  var giorni = ["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
  var mesi = ["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
  var d = new Date();
  var testo = giorni[d.getDay()] + " " + d.getDate() + " " + mesi[d.getMonth()] + " " + d.getFullYear();
  document.getElementById("dataOggi").textContent = testo;
}
aggiornaData();
</script>
</body>
</html>
